  <body>
    <style>
      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 50% 38%, rgba(139, 92, 246, 0.28), transparent 34%),
          linear-gradient(180deg, #0b0d28 0%, #071f2e 58%, #041018 100%);
        color: #fff;
        transition: opacity 220ms ease;
      }

      #boot-loader.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .boot-loader__panel {
        position: relative;
        width: min(22rem, calc(100vw - 2rem));
        padding: 2rem 1.25rem 1.5rem;
        text-align: center;
        font-family: Inter, system-ui, sans-serif;
      }

      .boot-loader__orb {
        width: 5.75rem;
        height: 5.75rem;
        margin: 0 auto 1rem;
        border-radius: 999px;
        background:
          radial-gradient(circle at 35% 30%, rgba(255,255,255,0.8), rgba(255,255,255,0.08) 28%, transparent 32%),
          linear-gradient(135deg, rgba(34,211,238,0.95), rgba(59,130,246,0.72) 48%, rgba(168,85,247,0.88));
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.08),
          0 14px 40px rgba(8, 145, 178, 0.28),
          0 0 36px rgba(56, 189, 248, 0.24);
        animation: boot-float 1.8s ease-in-out infinite;
      }

      .boot-loader__title {
        margin: 0;
        font-size: 2rem;
        font-weight: 900;
        letter-spacing: -0.03em;
      }

      .boot-loader__text {
        margin: 0.6rem 0 0;
        font-size: 0.95rem;
        font-weight: 600;
        color: rgba(255,255,255,0.68);
      }

      .boot-loader__bar {
        width: 100%;
        height: 0.5rem;
        margin-top: 1.3rem;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(9, 14, 23, 0.9);
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
      }

      .boot-loader__fill {
        height: 100%;
        width: 12%;
        border-radius: inherit;
        background: linear-gradient(90deg, #0f172a, #22d3ee 45%, #7dd3fc 72%, #e2e8f0);
        box-shadow: 0 0 24px rgba(34, 211, 238, 0.35);
        transition: width 180ms ease;
      }

      .boot-loader__percent {
        margin-top: 0.55rem;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(186, 230, 253, 0.88);
      }

      @keyframes boot-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
    </style>

    <div id="boot-loader" aria-hidden="false">
      <div class="boot-loader__panel">
        <div class="boot-loader__orb"></div>
        <h1 class="boot-loader__title">MonadFish</h1>
        <p class="boot-loader__text" id="boot-loader-text">Loading the lake...</p>
        <div class="boot-loader__bar" aria-hidden="true">
          <div class="boot-loader__fill" id="boot-loader-fill"></div>
        </div>
        <div class="boot-loader__percent" id="boot-loader-percent">0%</div>
      </div>
    </div>

    <script>
      window.__setBootLoaderState = function (progress, label) {
        var fill = document.getElementById('boot-loader-fill');
        var percent = document.getElementById('boot-loader-percent');
        var text = document.getElementById('boot-loader-text');
        var clamped = Math.max(0, Math.min(1, Number(progress || 0)));
        if (fill) fill.style.width = Math.round(clamped * 100) + '%';
        if (percent) percent.textContent = Math.round(clamped * 100) + '%';
        if (text && label) text.textContent = label;
      };

      window.__hideBootLoader = function () {
        var loader = document.getElementById('boot-loader');
        if (!loader) return;
        loader.classList.add('is-hidden');
        window.setTimeout(function () {
          if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
        }, 260);
      };
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

  <body>
    <style>
      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 50% 38%, rgba(139, 92, 246, 0.28), transparent 34%),
          linear-gradient(180deg, #0b0d28 0%, #071f2e 58%, #041018 100%);
        color: #fff;
        transition: opacity 220ms ease;
      }

      #boot-loader.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .boot-loader__panel {
        position: relative;
        width: min(22rem, calc(100vw - 2rem));
        padding: 1rem 1.25rem 1.5rem;
        text-align: center;
        font-family: Inter, system-ui, sans-serif;
      }

      .boot-loader__art {
        position: relative;
        overflow: hidden;
        width: min(18rem, calc(100vw - 4rem));
        aspect-ratio: 3 / 2;
        margin: 0 auto 1rem;
        border-radius: 1.75rem;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.04);
        box-shadow:
          0 22px 60px rgba(0, 0, 0, 0.38),
          inset 0 0 0 1px rgba(255,255,255,0.04);
      }

      .boot-loader__art img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
      }

      .boot-loader__art::after {
        content: "";
        position: absolute;
        inset: auto 0 0;
        height: 5rem;
        background: linear-gradient(180deg, transparent, rgba(4, 9, 19, 0.92));
      }

      .boot-loader__title {
        display: block;
        width: min(17rem, calc(100vw - 5rem));
        margin: 0.25rem auto 0;
      }

      .boot-loader__text {
        margin: 0.6rem 0 0;
        font-size: 0.95rem;
        font-weight: 600;
        color: rgba(255,255,255,0.68);
      }

      .boot-loader__bar {
        width: 100%;
        height: 0.5rem;
        margin-top: 1.3rem;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(9, 14, 23, 0.9);
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
      }

      .boot-loader__fill {
        height: 100%;
        width: 12%;
        border-radius: inherit;
        background: linear-gradient(90deg, #0f172a, #22d3ee 45%, #7dd3fc 72%, #e2e8f0);
        box-shadow: 0 0 24px rgba(34, 211, 238, 0.35);
        transition: width 180ms ease;
      }

      .boot-loader__percent {
        margin-top: 0.55rem;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(186, 230, 253, 0.88);
      }

    </style>

    <div id="boot-loader" aria-hidden="false">
      <div class="boot-loader__panel">
        <div class="boot-loader__art">
          <img src="/assets/loading_art_v2.png" alt="Fishing Game loading art" />
        </div>
        <img class="boot-loader__title" src="/assets/title_banner_v1.png" alt="Hook and Loot title banner" />
        <p class="boot-loader__text" id="boot-loader-text">Preparing the water...</p>
        <div class="boot-loader__bar" aria-hidden="true">
          <div class="boot-loader__fill" id="boot-loader-fill"></div>
        </div>
        <div class="boot-loader__percent" id="boot-loader-percent">0%</div>
      </div>
    </div>

    <script>
      window.__setBootLoaderState = function (progress, label) {
        var fill = document.getElementById('boot-loader-fill');
        var percent = document.getElementById('boot-loader-percent');
        var text = document.getElementById('boot-loader-text');
        var clamped = Math.max(0, Math.min(1, Number(progress || 0)));
        if (fill) fill.style.width = Math.round(clamped * 100) + '%';
        if (percent) percent.textContent = Math.round(clamped * 100) + '%';
        if (text && label) text.textContent = label;
      };

      window.__hideBootLoader = function () {
        var loader = document.getElementById('boot-loader');
        if (!loader) return;
        loader.classList.add('is-hidden');
        window.setTimeout(function () {
          if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
        }, 260);
      };
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

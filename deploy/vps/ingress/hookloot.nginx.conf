server {
  listen 80;
  server_name hookloot.xyz;
  return 301 https://www.hookloot.xyz$request_uri;
}

server {
  listen 80;
  server_name www.hookloot.xyz;
  return 301 https://www.hookloot.xyz$request_uri;
}

server {
  listen 443 ssl http2;
  server_name hookloot.xyz;

  ssl_certificate /etc/letsencrypt/live/www.hookloot.xyz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.hookloot.xyz/privkey.pem;

  return 301 https://www.hookloot.xyz$request_uri;
}

server {
  listen 443 ssl http2;
  server_name www.hookloot.xyz;

  ssl_certificate /etc/letsencrypt/live/www.hookloot.xyz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/www.hookloot.xyz/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:18181;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
